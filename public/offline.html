<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#28666e" />
    <title>Rate507 çevrimdışı</title>
    <style>
      :root {
        --background: #f5f2ec;
        --surface: #fffaf2;
        --ink: #211f1c;
        --muted: #6f6a61;
        --accent: #28666e;
        --line: #ded7ca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        background: var(--background);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        padding: 22px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 22px;
      }

      h1 {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 2rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Çevrimdışı</h1>
      <p>Rate507 açıldı ama ortak yorum verisine ulaşmak için bağlantı gerekiyor.</p>
    </main>
  </body>
</html>
